name: Release Desktop

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-windows-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[desktop-build,dev]

      - name: Run desktop validation
        run: |
          python -m pytest -q tests/test_desktop_assets.py tests/test_desktop_bridge.py tests/test_desktop_build.py tests/test_desktop_doctor.py tests/test_desktop_installer.py

      - name: Build Windows installer
        shell: powershell
        run: .\scripts\build_installer.ps1 -Archive

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: TeamMindHub-Setup
          path: |
            .tmp/desktop-build/release/TeamMindHub-Setup.exe
            .tmp/desktop-build/release/*.zip
            .tmp/desktop-build/release/manifest.json

      - name: Publish release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            .tmp/desktop-build/release/TeamMindHub-Setup.exe
            .tmp/desktop-build/release/*.zip
            .tmp/desktop-build/release/manifest.json
